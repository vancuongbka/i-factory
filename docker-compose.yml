version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ifactory-postgres
    restart: unless-stopped
    ports:
      - "6000:5432"
    environment:
      POSTGRES_DB: ifactory
      POSTGRES_USER: ifactory
      POSTGRES_PASSWORD: ifactory_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ifactory"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ifactory-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ifactory-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis

volumes:
  pgdata:
  redisdata:
